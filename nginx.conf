server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Never cache the runtime config (it's rewritten per-deploy from API_BASE_URL).
  location = /config.js {
    add_header Cache-Control "no-store";
  }

  # SPA: serve index.html for any non-file route.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
